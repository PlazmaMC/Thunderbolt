name: Upstream
on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"
  push:
    paths:
      - "upstream.yml"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Pull Branches
        id: matrix
        run: |
          json=$(curl --silent https://api.github.com/repos/plazmamc/thunderbolt/branches | jq -rc 'map(select(.name | test("feat/.*"))) | del(.[]|.protected) | del(.[]|.commit)')
          echo "matrix=$json" >> $GITHUB_OUTPUT

  upstream:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.name }}

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Configure Git
        run: git config --global user.email "action@github.com" && git config --global user.name "Github Action"

      - name: Update upstream
        run: ./gradlew updateUpstream

      - name: Commit changes
        run: printf "Updated Upstream (Plazma)\n\nUpstream has released updates that appear to apply and compile correctly\n\n$(cat compare.txt)" | git commit -F -

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ matrix.name }}
